<div class="card mb-3 shadow-sm cursor-grab" data-id="{{ lead.id }}">
    <div class="card-body p-3">
        <h6 class="mb-1 fw-bold">{{ lead.cliente.nome }} {{ lead.cliente.sobrenome }}</h6>
        <p class="small text-muted mb-2">
            <i class="bi bi-geo-alt"></i> Interesses: {{ lead.praia_interesse.nome|default:"Vários" }}
        </p>
        <div class="d-flex justify-content-between align-items-center">
            <span class="text-primary fw-bold small">R$ {{ lead.valor_proposto }}</span>
            <div class="btn-group">
                <a href="https://wa.me/55{{ lead.cliente.telefone }}?text=Olá {{ lead.cliente.nome }}, aqui é o John da JVC Turismo! Vamos fechar aquele passeio para {{ lead.praia_interesse.nome }}?" 
                   target="_blank" class="btn btn-sm btn-outline-success">
                    <i class="bi bi-whatsapp"></i>
                </a>
                <a href="{% url 'detalhe_cliente' lead.cliente.id %}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-eye"></i>
                </a>
            </div>
        </div>
    </div>
</div>
